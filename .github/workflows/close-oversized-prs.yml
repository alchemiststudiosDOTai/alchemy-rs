name: Close Oversized PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  issues: write
  pull-requests: write

jobs:
  close-oversized-pr:
    if: github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    env:
      MAX_TOTAL_DELTA: "600"
    steps:
      - name: Close PRs over the diff limit
        uses: actions/github-script@v7
        with:
          script: |
            const maxTotalDelta = Number(process.env.MAX_TOTAL_DELTA);
            const pull_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });

            const additions = pr.additions ?? 0;
            const deletions = pr.deletions ?? 0;
            const totalDelta = additions + deletions;

            core.info(
              `PR #${pull_number} changed lines: +${additions} / -${deletions} = ${totalDelta}`
            );

            if (totalDelta <= maxTotalDelta) {
              core.info(`PR is within the ${maxTotalDelta}-line limit.`);
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body: [
                `Closing this PR because it exceeds the repository diff limit of ${maxTotalDelta} changed lines.`,
                "",
                `Current diff: +${additions} / -${deletions} (${totalDelta} total).`,
                "Please split this into smaller PRs, then reopen once the total diff is below the limit.",
              ].join("\n"),
            });

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number,
              state: "closed",
            });
